<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klozed — Precision Outbound for SaaS</title>
<meta name="description" content="Klozed books qualified meetings with SaaS founders in the US and UK. AI-powered outbound that fills your pipeline while you focus on closing.">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
,::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;font-size:16px}
:root{
  --bg:#020408;
  --bg2:#060c14;
  --bg3:#0a1220;
  --cyan:#00d4ff;
  --cyan2:#00a8cc;
  --cyan3:rgba(0,212,255,.08);
  --green:#00ff88;
  --white:#f0f8ff;
  --gray:#6b8299;
  --gray2:#3d5269;
  --border:rgba(0,212,255,.12);
  --border2:rgba(0,212,255,.25);
}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;font-weight:300;overflow-x:hidden;cursor:none;line-height:1.6}

/* CURSOR */
.cur{width:6px;height:6px;background:var(--cyan);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s;box-shadow:0 0 10px var(--cyan)}
.cur-ring{width:32px;height:32px;border:1px solid rgba(0,212,255,.4);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .15s ease}

/* NOISE */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.5}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:20px 5%;display:flex;justify-content:space-between;align-items:center;background:rgba(2,4,8,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:4px;text-transform:uppercase;text-decoration:none;background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:32px;list-style:none;align-items:center}
.nav-links a{color:var(--gray);text-decoration:none;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;transition:color .3s}
.nav-links a:hover{color:var(--cyan)}
.nav-cta{background:transparent!important;border:1px solid var(--cyan)!important;color:var(--cyan)!important;padding:10px 24px!important;font-size:11px!important;letter-spacing:2px!important;text-transform:uppercase!important;transition:all .3s!important}
.nav-cta:hover{background:var(--cyan)!important;color:var(--bg)!important}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:120px 5% 80px;text-align:center}

/* animated grid */
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%)}

/* glowing orbs */
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat ease-in-out infinite}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(0,212,255,.15),transparent 70%);top:10%;left:10%;animation-duration:12s}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(0,255,136,.1),transparent 70%);bottom:10%;right:10%;animation-duration:15s;animation-delay:-5s}
.orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(0,212,255,.08),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation-duration:10s;animation-delay:-3s}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}

/* scan line */
.scanline{position:absolute;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scan 4s linear infinite;opacity:.3}
@keyframes scan{0%{top:-2px}100%{top:100%}}

.hero-content{position:relative;z-index:2;max-width:900px}

.hero-badge{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--border2);background:rgba(0,212,255,.05);padding:8px 20px;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--cyan);margin-bottom:40px;animation:fadeUp .8s ease forwards .2s;opacity:0}
.badge-pulse{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s ease infinite;box-shadow:0 0 8px var(--green)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}

.hero-title{font-family:'Syne',sans-serif;font-size:clamp(44px,8vw,96px);font-weight:800;line-height:.95;letter-spacing:-2px;margin-bottom:28px;animation:fadeUp .8s ease forwards .4s;opacity:0}
.hero-title .line1{display:block;color:var(--white)}
.hero-title .line2{display:block;background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-title .line3{display:block;color:var(--white)}

.hero-sub{font-size:clamp(14px,1.5vw,17px);line-height:1.8;color:var(--gray);max-width:560px;margin:0 auto 52px;animation:fadeUp .8s ease forwards .6s;opacity:0}

.hero-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;animation:fadeUp .8s ease forwards .8s;opacity:0}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:var(--bg);padding:16px 40px;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-family:'Inter',sans-serif;font-weight:500;text-decoration:none;transition:all .3s;display:inline-block;border:none;cursor:pointer;position:relative;overflow:hidden}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--green),var(--cyan));opacity:0;transition:opacity .3s}
.btn-primary:hover::before{opacity:1}
.btn-primary span{position:relative;z-index:1}
.btn-secondary{border:1px solid var(--border2);color:var(--cyan);padding:16px 40px;font-size:11px;letter-spacing:3px;text-transform:uppercase;text-decoration:none;transition:all .3s;display:inline-block}
.btn-secondary:hover{background:rgba(0,212,255,.08);border-color:var(--cyan)}

.hero-stats{display:flex;gap:48px;justify-content:center;margin-top:72px;animation:fadeUp .8s ease forwards 1.2s;opacity:0;flex-wrap:wrap}
.hero-stat-num{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.hero-stat-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gray);margin-top:4px}

.scroll-ind{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;animation:fadeUp .8s ease forwards 1.6s;opacity:0}
.scroll-ind span{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gray2)}
.scroll-line{width:1px;height:48px;background:linear-gradient(to bottom,var(--cyan),transparent);animation:scrollPulse 2s ease infinite}
@keyframes scrollPulse{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* TICKER */
.ticker{background:linear-gradient(135deg,var(--bg2),var(--bg3));border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:16px 0;overflow:hidden}
.ticker-track{display:flex;animation:tick 25s linear infinite;white-space:nowrap}
.ticker-item{display:inline-flex;align-items:center;gap:16px;padding:0 32px;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gray);flex-shrink:0}
.ticker-item strong{color:var(--cyan)}
.tdot{width:3px;height:3px;background:var(--cyan);border-radius:50%;opacity:.5}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* SECTIONS */
.section{padding:120px 5%}
.section-inner{max-width:1200px;margin:0 auto}
.stag{display:inline-flex;align-items:center;gap:10px;font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--cyan);margin-bottom:20px}
.stag::before{content:'';width:24px;height:1px;background:var(--cyan)}
.h2{font-family:'Syne',sans-serif;font-size:clamp(36px,5vw,64px);font-weight:800;line-height:1.05;margin-bottom:16px;letter-spacing:-1px}
.h2 span{background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cyan-line{width:48px;height:2px;background:linear-gradient(90deg,var(--cyan),transparent);margin:24px 0 44px}
.body-p{font-size:15px;line-height:1.9;color:var(--gray);max-width:560px}

/* PROBLEM SECTION */
.problem{background:var(--bg2)}
.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;margin-top:60px}
.problem-list{display:flex;flex-direction:column;gap:24px}
.problem-item{display:flex;gap:20px;align-items:flex-start;padding:28px;border:1px solid var(--border);background:rgba(0,212,255,.02);transition:all .4s;position:relative;overflow:hidden}
.problem-item::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(to bottom,var(--cyan),transparent);opacity:0;transition:opacity .4s}
.problem-item:hover{border-color:var(--border2);background:rgba(0,212,255,.05)}
.problem-item:hover::before{opacity:1}
.pi-icon{width:44px;height:44px;flex-shrink:0;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:18px;background:rgba(0,212,255,.05)}
.pi-text h4{font-family:'Syne',sans-serif;font-size:17px;font-weight:600;margin-bottom:6px;color:var(--white)}
.pi-text p{font-size:13px;line-height:1.8;color:var(--gray)}
.problem-visual{position:relative}
.terminal{background:var(--bg3);border:1px solid var(--border);padding:28px;font-family:'Courier New',monospace;font-size:12px;position:relative}
.terminal::before{content:'● ● ●';position:absolute;top:12px;left:20px;font-size:10px;color:var(--gray2);letter-spacing:4px}
.terminal-body{margin-top:28px;display:flex;flex-direction:column;gap:12px}
.t-line{display:flex;gap:12px;align-items:center}
.t-prompt{color:var(--cyan)}
.t-cmd{color:var(--green)}
.t-output{color:var(--gray);font-size:11px}
.t-cursor{display:inline-block;width:8px;height:14px;background:var(--cyan);animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* PROCESS */
.process-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:60px}
.pstep{background:var(--bg2);padding:56px 44px;position:relative;overflow:hidden;transition:all .4s;border-bottom:2px solid transparent}
.pstep::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,255,.05),transparent);opacity:0;transition:opacity .4s}
.pstep:hover{border-bottom-color:var(--cyan)}
.pstep:hover::after{opacity:1}
.pstep-num{font-family:'Syne',sans-serif;font-size:72px;font-weight:800;color:rgba(0,212,255,.06);line-height:1;margin-bottom:24px;transition:color .4s}
.pstep:hover .pstep-num{color:rgba(0,212,255,.15)}
.pstep-icon{width:48px;height:48px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:20px;margin-bottom:20px;background:rgba(0,212,255,.05)}
.pstep h3{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;margin-bottom:14px;color:var(--white)}
.pstep p{font-size:13px;line-height:1.9;color:var(--gray)}
.pstep-arrow{position:absolute;top:28px;right:28px;color:rgba(0,212,255,.2);font-size:20px;transition:all .4s}
.pstep:hover .pstep-arrow{color:var(--cyan);transform:translate(4px,-4px)}

/* SERVICES */
.services{background:var(--bg2)}
.services-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:60px}
.scard{background:var(--bg);padding:52px 48px;border:1px solid transparent;transition:all .4s;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);transform:scaleX(0);transition:transform .4s}
.scard:hover{border-color:var(--border);background:var(--bg2)}
.scard:hover::before{transform:scaleX(1)}
.scard-icon{width:52px;height:52px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:22px;margin-bottom:28px;transition:all .4s;background:rgba(0,212,255,.05)}
.scard:hover .scard-icon{background:var(--cyan);color:var(--bg);border-color:var(--cyan)}
.scard h3{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;margin-bottom:14px;color:var(--white)}
.scard p{font-size:13px;line-height:1.9;color:var(--gray);margin-bottom:24px}
.scard-features{list-style:none;display:flex;flex-direction:column;gap:8px}
.scard-features li{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--gray);letter-spacing:.5px}
.scard-features li::before{content:'';width:16px;height:1px;background:var(--cyan);flex-shrink:0}

/* WHY */
.why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:60px}
.wcard{background:var(--bg2);padding:44px 36px;text-align:center;transition:all .4s;position:relative;overflow:hidden}
.wcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);transform:scaleX(0);transition:transform .4s}
.wcard:hover::after{transform:scaleX(1)}
.wcard-icon{width:60px;height:60px;border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;background:rgba(0,212,255,.05);transition:all .4s}
.wcard:hover .wcard-icon{background:rgba(0,212,255,.15);border-color:var(--cyan);box-shadow:0 0 20px rgba(0,212,255,.2)}
.wcard h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:12px;color:var(--white)}
.wcard p{font-size:13px;line-height:1.85;color:var(--gray)}

/* WHO WE HELP */
.who{background:var(--bg2)}
.who-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;margin-top:60px}
.who-cards{display:flex;flex-direction:column;gap:16px}
.who-card{padding:28px 32px;border:1px solid var(--border);background:var(--bg);transition:all .4s;position:relative;overflow:hidden}
.who-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--cyan),var(--green));transform:scaleY(0);transition:transform .4s;transform-origin:top}
.who-card:hover{border-color:var(--border2);background:var(--bg2)}
.who-card:hover::before{transform:scaleY(1)}
.who-card h4{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px;color:var(--white)}
.who-card p{font-size:13px;line-height:1.8;color:var(--gray)}
.who-card-tag{display:inline-block;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);border:1px solid var(--border2);padding:4px 10px;margin-bottom:14px}
.metrics-box{background:var(--bg3);border:1px solid var(--border);padding:40px;position:relative}
.metrics-box::before{content:'LIVE METRICS';position:absolute;top:-10px;left:24px;background:var(--bg3);padding:0 8px;font-size:9px;letter-spacing:4px;color:var(--cyan)}
.metric-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border)}
.metric-row:last-child{border-bottom:none}
.metric-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gray)}
.metric-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.metric-bar{width:100%;height:3px;background:var(--bg);margin-top:6px;position:relative}
.metric-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));animation:fillAnim 2s ease forwards}
@keyframes fillAnim{from{width:0}to{width:var(--fill)}}

/* FAQ */
.faq{background:var(--bg2)}
.faq-list{max-width:760px;margin:60px auto 0}
.faq-item{border-bottom:1px solid var(--border)}
.faq-q{display:flex;justify-content:space-between;align-items:center;padding:24px 0;cursor:pointer;font-size:15px;font-weight:400;transition:color .3s;user-select:none;gap:16px;color:var(--white)}
.faq-q:hover{color:var(--cyan)}
.faq-icon{color:var(--cyan);font-size:20px;transition:transform .3s;flex-shrink:0;font-family:'Syne',sans-serif;font-weight:800}
.faq-a{font-size:14px;line-height:1.9;color:var(--gray);padding:0 0 24px;display:none}
.faq-item.open .faq-icon{transform:rotate(45deg)}
.faq-item.open .faq-a{display:block}

/* CTA */
.cta-section{padding:160px 5%;text-align:center;position:relative;overflow:hidden}
.cta-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(0,212,255,.08) 0%,transparent 70%)}
.cta-box{position:relative;z-index:2;max-width:700px;margin:0 auto;border:1px solid var(--border);padding:80px 60px;background:rgba(0,212,255,.02)}
.cta-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),transparent)}
.cta-box::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--green),transparent)}
.cta-tag{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--green);margin-bottom:24px;display:block}
.cta-h{font-family:'Syne',sans-serif;font-size:clamp(36px,5vw,56px);font-weight:800;margin-bottom:20px;letter-spacing:-1px}
.cta-sub{font-size:15px;color:var(--gray);line-height:1.9;max-width:480px;margin:0 auto 48px}
.cta-note{font-size:11px;color:var(--gray2);letter-spacing:1px;margin-top:16px}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;margin-top:60px}
.contact-info h3{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;margin-bottom:20px;background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.contact-info p{font-size:14px;line-height:1.9;color:var(--gray);margin-bottom:36px}
.contact-details{display:flex;flex-direction:column;gap:20px}
.cd{display:flex;gap:14px;align-items:flex-start}
.cd-icon{color:var(--cyan);font-size:16px;margin-top:2px}
.cd-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);margin-bottom:4px}
.cd-text{font-size:13px;color:var(--gray)}
.contact-form{display:flex;flex-direction:column;gap:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-field{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan)}
.form-input,.form-select,.form-textarea{background:rgba(0,212,255,.03);border:1px solid var(--border);color:var(--white);padding:13px 16px;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .3s;width:100%}
.form-input::placeholder,.form-textarea::placeholder{color:var(--gray2)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--cyan);background:rgba(0,212,255,.05)}
.form-select{appearance:none;cursor:pointer}
.form-select option{background:var(--bg3)}
.form-textarea{resize:vertical;min-height:110px}

/* FOOTER */
footer{background:var(--bg2);border-top:1px solid var(--border);padding:72px 5% 36px}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;margin-bottom:
